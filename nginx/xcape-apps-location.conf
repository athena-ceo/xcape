#
# xCape — path-based serving under https://apps.athenadecisions.com/xcape
#
# HOW TO USE: paste the location blocks below INSIDE the existing
#   server { server_name apps.athenadecisions.com; ... }
# block in /etc/nginx/sites-available/apps.athenadecisions.com (alongside the
# other apps), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Containers (docker-compose.server.yml): frontend 3030, backend 8030.
# The SPA is built with base=/xcape/ so its assets resolve under /xcape/.
# When you later move to a dedicated subdomain, use nginx/xcape.conf.example
# instead and rebuild the frontend with XCAPE_BASE_PATH=/.

###############################################################################
### 🧭 xCape — find a place to move
###############################################################################

    # API -> xCape backend. ^~ so it wins over the SPA prefix and any regex
    # locations. Trailing /api/ on proxy_pass strips the /xcape prefix:
    #   /xcape/api/v1/...  ->  http://127.0.0.1:8030/api/v1/...
    location ^~ /xcape/api/ {
        proxy_pass http://127.0.0.1:8030/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # AI calls use web search and can take 60-120s. Without these, nginx's
        # default 60s read timeout would 504 on country research / media fetch.
        proxy_connect_timeout 180;
        proxy_send_timeout    180;
        proxy_read_timeout    180;
        send_timeout          180;
    }

    location = /xcape/health {
        proxy_pass http://127.0.0.1:8030/health;
        proxy_set_header Host $host;
    }

    location = /xcape {
        return 301 /xcape/;
    }

    # Frontend SPA. Trailing slash strips /xcape/ before hitting the container,
    # whose nginx serves the static build and falls back to index.html for
    # client-side routes.
    location ^~ /xcape/ {
        proxy_pass http://127.0.0.1:3030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
