#
# In-container nginx for the built SPA. The external nginx (xcape.conf.example)
# terminates TLS and proxies /api to the backend; this server only serves static
# assets and falls back to index.html for client-side routes.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
